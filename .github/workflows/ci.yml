name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  DOTNET_COVERAGE_VERSION: 18.7.*
  SOLUTION_FILE: FoggyBalrog.Collections.slnx
  SONAR_ORGANIZATION: foggybalrog-github
  SONAR_PROJECT_KEY: FoggyBalrog_Collections
  SONAR_SCANNER_VERSION: 11.2.*

jobs:
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v4
        with:
          path: ${{ runner.temp }}/sonar-scanner
          key: ${{ runner.os }}-sonar-scanner-${{ env.SONAR_SCANNER_VERSION }}
          restore-keys: ${{ runner.os }}-sonar-scanner-

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install SonarScanner for .NET
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        run: dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}/sonar-scanner" --version "${{ env.SONAR_SCANNER_VERSION }}"

      - name: Install dotnet-coverage
        run: dotnet tool install --global dotnet-coverage --version "${{ env.DOTNET_COVERAGE_VERSION }}"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build, test, and analyze
        shell: pwsh
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          if ([string]::IsNullOrWhiteSpace($env:SONAR_TOKEN)) {
            throw "SONAR_TOKEN is not configured. Add it as a repository secret before running SonarCloud analysis."
          }

          & "${env:RUNNER_TEMP}/sonar-scanner/dotnet-sonarscanner" begin `
            /k:"$env:SONAR_PROJECT_KEY" `
            /o:"$env:SONAR_ORGANIZATION" `
            /d:sonar.host.url="https://sonarcloud.io" `
            /d:sonar.token="$env:SONAR_TOKEN" `
            /d:sonar.qualitygate.wait="true" `
            /d:sonar.cs.vscoveragexml.reportsPaths="coverage.xml" `
            /d:sonar.cs.vstest.reportsPaths="**/*.trx" `
            /d:sonar.coverage.exclusions="FoggyBalrog.Collections.Benchmarks/**"

          dotnet build $env:SOLUTION_FILE --no-restore --no-incremental

          dotnet-coverage collect "dotnet test $env:SOLUTION_FILE --no-build --logger trx" -f xml -o coverage.xml

          & "${env:RUNNER_TEMP}/sonar-scanner/dotnet-sonarscanner" end /d:sonar.token="$env:SONAR_TOKEN"

  fallback-build:
    name: Fallback Build and Test
    runs-on: ubuntu-latest
    needs: sonar
    if: always() && needs.sonar.result == 'skipped'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_FILE }} --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION_FILE }} --no-build
